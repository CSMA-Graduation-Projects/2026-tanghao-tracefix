services:
  mysql:
    image: mysql:8.0
    container_name: cfix-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${CFIX_MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${CFIX_MYSQL_DATABASE:-cfix_db}
      MYSQL_ROOT_HOST: "%"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./cfix_schema.sql:/docker-entrypoint-initdb.d/01-cfix_schema.sql:ro
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    image: python:3.11-slim
    container_name: cfix-backend
    restart: unless-stopped
    working_dir: /app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_ENV: docker
      APP_DEBUG: "true"
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: ${CFIX_MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DB: ${CFIX_MYSQL_DATABASE:-cfix_db}
      JWT_SECRET: ${CFIX_JWT_SECRET:-change-this-secret}
      LLM_ENABLE: ${CFIX_LLM_ENABLE:-false}
      SANDBOX_BACKEND: ${CFIX_SANDBOX_BACKEND:-safe_exec}
      SANDBOX_WORK_ROOT: /tmp/cfix_sandbox
      SANDBOX_IMAGE: cfix-python-sandbox:latest
      SANDBOX_DOCKER_BIN: docker
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"
    volumes:
      - ./cfix_server:/app
      - backend_pip_cache:/root/.cache/pip
    command: >
      sh -c "
      pip install -r req.txt &&
      python -m app.db.init_db &&
      python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  frontend:
    image: node:20-alpine
    container_name: cfix-frontend
    restart: unless-stopped
    working_dir: /web
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8000/api/v1
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./cfix_frontend:/web
      - frontend_node_modules:/web/node_modules
    command: >
      sh -c "
      npm install &&
      npm run dev -- --host 0.0.0.0 --port 5173
      "

volumes:
  mysql_data:
  backend_pip_cache:
  frontend_node_modules: